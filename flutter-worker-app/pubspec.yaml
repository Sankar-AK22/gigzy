name: gigshield_worker
description: "GigShield - AI-Powered Insurance for Gig Workers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # UI & Charts
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.3
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/



version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gigshield-db
    environment:
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield_user
      POSTGRES_PASSWORD: gigshield_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield_user -d gigshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build: ./springboot-backend
    container_name: gigshield-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gigshield
      SPRING_DATASOURCE_USERNAME: gigshield_user
      SPRING_DATASOURCE_PASSWORD: gigshield_pass_2026
      AI_SERVICE_URL: http://ai-service:8000
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "8080:8080"

  # Python AI/ML Service
  ai-service:
    build: ./ai-risk-service
    container_name: gigshield-ai
    environment:
      DATABASE_URL: postgresql://gigshield_user:gigshield_pass_2026@postgres:5432/gigshield
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # React Admin Dashboard
  admin-dashboard:
    build: ./admin-dashboard
    container_name: gigshield-admin
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
